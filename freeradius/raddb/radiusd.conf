######################################################################
#
#  radiusd.conf — Main FreeRADIUS configuration for Wasel
#
#  Debian/Ubuntu layout (official Docker image: freeradius/freeradius-server)
#
######################################################################

#
#  Global settings
#
prefix = /usr
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
sbindir = ${exec_prefix}/sbin
logdir = /var/log/freeradius
raddbdir = /etc/freeradius
radacctdir = ${logdir}/radacct
confdir = ${raddbdir}
modconfdir = ${confdir}/mods-config
certdir = ${confdir}/certs
cadir = ${confdir}/certs
run_dir = ${localstatedir}/run/freeradius
db_dir = ${raddbdir}

#
#  name: The name of the daemon — used for PID file, log, etc.
#
name = freeradius

#
#  Top-level directives that upstream modules (eap, etc.) reference via
#  ${name}. These must be defined at top-level, not inside any block, or
#  FR 3.2.5+ aborts startup with e.g. `mods-enabled/eap[87]: Reference
#  "${max_requests}" not found`. Values are the FR 3.2.x upstream
#  radiusd.conf.in defaults.
#
max_request_time  = 30
cleanup_delay     = 5
max_requests      = 16384
hostname_lookups  = no
proxy_requests    = yes

#
#  Logging — output to stdout for Docker
#
log {
    destination = stdout
    colourise = yes

    #  Log authentication requests (Access-Accept / Access-Reject)
    auth = yes

    #  Log passwords in auth requests — ONLY enable for debugging, NEVER in production
    auth_badpass = no
    auth_goodpass = no

    #  Log the full User-Name attribute
    stripped_names = no
}

#
#  Security settings
#
security {
    #  User and group to run as (Debian FreeRADIUS convention)
    user = freerad
    group = freerad

    #  Ensure only the FreeRADIUS user can read config files
    allow_core_dumps = no

    #  Maximum number of requests the server handles in parallel
    max_attributes = 200

    #  Reject delay — wait 1 second before sending Access-Reject
    #  Helps slow down brute-force attacks
    reject_delay = 1

    #  Status server — enable for monitoring (only from localhost)
    status_server = yes

    #  BlastRADIUS (CVE-2024-3596) mitigations disabled at the GLOBAL level
    #  so that SQL-loaded dynamic NAS clients (read from the `nas` table via
    #  mods-enabled/sql with read_clients=yes) inherit the same behavior as
    #  the static stanzas in clients.conf. Setting these only on a static
    #  client block does NOT template onto dynamic clients — FreeRADIUS
    #  3.2.4 uses the security-block defaults here for any client that
    #  doesn't override them.
    #
    #  RouterOS 7.12 on a WireGuard tunnel cannot validate an Access-Accept
    #  carrying a FreeRADIUS-added Message-Authenticator, so the router
    #  silently discards replies (visible as `bad-replies` on /radius
    #  monitor with `accepts` stuck at 0). Disabling here restores voucher
    #  auth end-to-end.
    #
    #  Exposure: FreeRADIUS is only reachable via the WireGuard tunnel (no
    #  public 1812/udp binding); exploiting BlastRADIUS would require an
    #  on-path attacker already inside the WG mesh. Matches the working
    #  Wassal reference deployment.
    require_message_authenticator = no
    limit_proxy_state = no
}

#
#  Thread pool — tuned for a moderate number of concurrent RADIUS requests
#
thread pool {
    start_servers = 5
    max_servers = 32
    min_spare_servers = 3
    max_spare_servers = 10
    max_requests_per_server = 0
    auto_limit_acct = no
}

#
#  Module configuration
#
#  Enable modules by placing config files in mods-enabled/
#  Available modules are in mods-available/
#
#  We include all enabled modules (sql, pap, chap, mschap, etc.)
#
$INCLUDE mods-enabled/

#
#  Policy configuration — use the distribution defaults
#
policy {
    $INCLUDE policy.d/
}

#
#  Load virtual servers from sites-enabled/
#  (default server for auth/acct, coa server for disconnect)
#
$INCLUDE sites-enabled/

#
#  Client definitions (static + dynamic from SQL)
#
$INCLUDE clients.conf
