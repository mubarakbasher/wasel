#
#  clients.conf — Static RADIUS client definitions
#
#  Dynamic clients are loaded from the PostgreSQL 'nas' table via
#  read_clients = yes in the sql module. Each router registered through
#  the Wasel API gets an entry in the nas table with its WireGuard
#  tunnel IP and unique RADIUS shared secret.
#
#  BlastRADIUS (CVE-2024-3596) mitigations (require_message_authenticator,
#  limit_proxy_state) are configured globally in radiusd.conf's security{}
#  block so that SQL-loaded dynamic NAS clients inherit them. Do not set
#  those here — per-stanza settings do not template onto dynamic clients.
#

#
#  Localhost — for radtest and health checks from the same host.
#  Trusted loopback.
#
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    nas_type = other
}

# All routers MUST have a per-NAS entry in the 'nas' table with their unique
# shared secret, loaded at startup via read_clients=yes in mods-enabled/sql.
# No fallback client block exists — an unregistered router cannot
# authenticate, and FreeRADIUS will log
#   "Ignoring request ... from unknown client <ip>"
# which is the upstream-documented diagnosable signal for missing NAS rows.
# A previous placeholder /16 stanza with secret=PLACEHOLDER_OVERRIDDEN_BY_NAS_TABLE
# was removed because it intercepted those packets and produced a silent
# HMAC failure instead of the actionable log line.
