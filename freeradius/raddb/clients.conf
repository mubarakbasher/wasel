#
#  clients.conf — Static RADIUS client definitions
#
#  Dynamic clients are loaded from the PostgreSQL 'nas' table via
#  read_clients = yes in the sql module. Each router registered through
#  the Wasel API gets an entry in the nas table with its WireGuard
#  tunnel IP and unique RADIUS shared secret.
#
#  BlastRADIUS (CVE-2024-3596) mitigations (require_message_authenticator,
#  limit_proxy_state) are configured globally in radiusd.conf's security{}
#  block so that SQL-loaded dynamic NAS clients inherit them. Do not set
#  those here — per-stanza settings do not template onto dynamic clients.
#

#
#  Localhost — for radtest and health checks from the same host.
#  Trusted loopback.
#
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    nas_type = other
}

#
#  Dynamic clients trigger. Any 10.10.0.x IP that isn't already loaded
#  as a /32 client at FR startup (via mods-enabled/sql's read_clients =
#  yes) invokes the dynamic_client_server virtual server on its first
#  Access-Request. That server looks the NAS up in the nas table and
#  populates FreeRADIUS-Client-* control attributes so FR can build a
#  client entry in memory without needing a restart.
#
#  Longest-prefix match: /32 clients loaded at startup still win over
#  this /16, so existing routers keep working unchanged — only routers
#  added AFTER FR started hit this path.
#
#  lifetime = 3600 → a rotated secret takes at most one hour to
#  propagate. Trade-off documented in the plan; shorten if faster
#  rotation becomes a requirement.
#
client lookup_wasel_nas {
    ipaddr          = 10.10.0.0/16
    dynamic_clients = dynamic_client_server
    lifetime        = 3600
}

# All routers MUST have a per-NAS entry in the 'nas' table with their unique shared secret. No fallback client block exists — an unregistered router cannot authenticate.
