#
#  clients.conf — Static RADIUS client definitions
#
#  Dynamic clients are loaded from the PostgreSQL 'nas' table via
#  read_clients = yes in the sql module. Each router registered through
#  the Wasel API gets an entry in the nas table with its WireGuard
#  tunnel IP and unique RADIUS shared secret.
#
#  The entries below are static fallbacks.
#
#  Security: require_message_authenticator = yes is enforced on all
#  non-localhost clients to mitigate the BlastRADIUS (CVE-2024-3596)
#  MD5 collision attack. RouterOS 7 sends Message-Authenticator
#  automatically; RouterOS 6 operators must add:
#    /radius set [find] message-authenticator-required=yes
#  See deploy.md § RADIUS Message-Authenticator for details.
#

#
#  Localhost — for radtest and health checks from the same host.
#  Trusted loopback; Message-Authenticator not required here.
#
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

#
#  Default client block — applies to dynamically loaded NAS entries
#  from the 'nas' table that do not have an explicit require_message_authenticator
#  column.
#
#  require_message_authenticator was previously set to `yes` here as a
#  BlastRADIUS (CVE-2024-3596) mitigation, but it caused RouterOS 7.12
#  to flag every Access-Accept reply as a Bad Reply (visible in the
#  router's /radius monitor counter as `bad-replies` incrementing while
#  `accepts` stayed at 0). FreeRADIUS adds Message-Authenticator to
#  outbound replies when require_message_authenticator is enabled, and
#  that combination interacts badly with this RouterOS version's reply
#  validation path on a WireGuard tunnel. Set to `no` so vouchers can
#  authenticate end-to-end. Wassal (the working reference operator
#  uses) does not enforce this either.
#
#  TODO: re-enable BlastRADIUS protection once we've isolated the
#  specific RouterOS attribute / packet-shape issue that fails the
#  validation. Tracked separately.
#
client default_wg_routers {
    ipaddr = 10.10.0.0/16
    secret = PLACEHOLDER_OVERRIDDEN_BY_NAS_TABLE
    require_message_authenticator = no
    nas_type = other
}

# All routers MUST have a per-NAS entry in the 'nas' table with their unique shared secret. No fallback client block exists — an unregistered router cannot authenticate.
