#
#  clients.conf — Static RADIUS client definitions
#
#  Dynamic clients are loaded from the PostgreSQL 'nas' table via
#  read_clients = yes in the sql module. Each router registered through
#  the Wasel API gets an entry in the nas table with its WireGuard
#  tunnel IP and unique RADIUS shared secret.
#
#  The entries below are static fallbacks.
#

#
#  Localhost — for radtest and health checks from the same host
#
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

#
#  WireGuard subnet — allow all routers connected via WireGuard VPN.
#  Each router has a /30 within 10.10.0.0/16.
#
#  In production, each router should have its own unique secret stored
#  in the 'nas' table. This block serves as a fallback so that a
#  router can still authenticate if its nas entry is missing.
#
client wireguard {
    ipaddr = 10.10.0.0/16
    secret = DEFAULT_RADIUS_SECRET
    require_message_authenticator = no
    nas_type = other
}
