#
#  clients.conf — RADIUS client definitions
#
#  Every router NAS is resolved via dynamic_client_server (sites-enabled/
#  dynamic-clients), which queries the PostgreSQL `nas` table by source
#  IP on demand and caches the resolved client for `lifetime` seconds.
#  read_clients is OFF in mods-enabled/sql — boot-time bulk loading was
#  removed because it produced static in-memory clients with no TTL,
#  which made delete-then-recreate-same-tunnel-IP swaps fail silently
#  for up to an hour. One source of truth = the live nas table.
#
#  BlastRADIUS (CVE-2024-3596) mitigations (require_message_authenticator,
#  limit_proxy_state) are configured globally in radiusd.conf's security{}
#  block so that dynamically-built clients inherit them. Do not set those
#  here — per-stanza settings do not template onto dynamic clients.
#

#
#  Localhost — for radtest and health checks from the same host.
#  Trusted loopback.
#
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    nas_type = other
}

#
#  WireGuard tunnel subnet — dynamic NAS resolution.
#
#  Any source IP in 10.10.0.0/16 triggers the dynamic_client_server
#  vserver on first packet (or on first packet after lifetime expiry).
#  The vserver looks the NAS up in the `nas` table by source IP and
#  populates the in-memory client. Cached for `lifetime` seconds.
#
#  lifetime = 120: short enough that delete-then-recreate-same-IP heals
#  within 2 minutes without operator intervention; long enough that hot-
#  path voucher auth doesn't trigger a SELECT on every packet (one
#  ~20-50 ms postgres roundtrip per router per 2 min — trivial cost).
#
client lookup_wasel_nas {
    ipaddr          = 10.10.0.0/16
    dynamic_clients = dynamic_client_server
    lifetime        = 120
}

# Unknown source IPs OUTSIDE 10.10.0.0/16 still produce the upstream
# "Ignoring request ... from unknown client <ip>" log line — no fallback
# /16 stanza intercepts them. A previous placeholder default_wg_routers
# block with secret=PLACEHOLDER_OVERRIDDEN_BY_NAS_TABLE was removed
# (commit 8cecf56) because it caused silent HMAC failures, and must NOT
# be reintroduced.
