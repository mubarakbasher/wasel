#
#  clients.conf — Static RADIUS client definitions
#
#  Dynamic clients are loaded from the PostgreSQL 'nas' table via
#  read_clients = yes in the sql module. Each router registered through
#  the Wasel API gets an entry in the nas table with its WireGuard
#  tunnel IP and unique RADIUS shared secret.
#
#  BlastRADIUS (CVE-2024-3596) mitigations (require_message_authenticator,
#  limit_proxy_state) are configured globally in radiusd.conf's security{}
#  block so that SQL-loaded dynamic NAS clients inherit them. Do not set
#  those here — per-stanza settings do not template onto dynamic clients.
#

#
#  Localhost — for radtest and health checks from the same host.
#  Trusted loopback.
#
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    nas_type = other
}

#
#  WireGuard tunnel subnet — dynamic NAS resolution.
#
#  Any source IP in 10.10.0.0/16 that is not already in FR's in-memory
#  client table triggers the dynamic_client_server vserver, which looks
#  the NAS up in the `nas` table by source IP. The resolved client is
#  cached in memory for `lifetime` seconds, then re-fetched.
#
client lookup_wasel_nas {
    ipaddr          = 10.10.0.0/16
    dynamic_clients = dynamic_client_server
    lifetime        = 3600
}

# Two-tier NAS loading:
#   - Routers added BEFORE FR boot are loaded by `read_clients = yes` in
#     mods-enabled/sql via a single bulk SELECT at startup (fast path).
#   - Routers added AFTER FR boot trigger the dynamic_client_server
#     vserver on first packet — an SQL lookup populates an in-memory
#     client cached for `lifetime = 3600` seconds.
# Unknown source IPs OUTSIDE 10.10.0.0/16 still produce the upstream
# "Ignoring request ... from unknown client <ip>" log line — no fallback
# /16 stanza intercepts them. A previous placeholder default_wg_routers
# block with secret=PLACEHOLDER_OVERRIDDEN_BY_NAS_TABLE was removed
# (commit 8cecf56) because it caused silent HMAC failures, and must NOT
# be reintroduced.
