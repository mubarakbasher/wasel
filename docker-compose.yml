services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest@sha256:8e505886ba5da6788f1b9dfc62a25e2f2c3a96e64e6528ef7278d7e1d6649bd2
    container_name: wireguard
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /etc/wireguard:/config/wg_confs
      - /lib/modules:/lib/modules:ro
    healthcheck:
      test: ['CMD-SHELL', 'wg show wg0 2>/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  backend:
    build: ./backend
    network_mode: host
    cap_add:
      - NET_ADMIN
    env_file:
      - ./backend/.env
    volumes:
      - /etc/wireguard:/etc/wireguard
      - backend_uploads:/app/uploads
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      wireguard:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0

  postgres:
    image: postgres:16-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    environment:
      POSTGRES_DB: wasel
      POSTGRES_USER: wasel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in compose env-file}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wasel']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0

  redis:
    image: redis:7-alpine@sha256:efc27681bf81e6ed55cb581718b7818c6c04c39b1f9aa40854edd3ea2241b6ed
    command: ['sh', '-c', 'exec redis-server --requirepass "$$REDIS_PASSWORD"']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in compose env-file}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  freeradius:
    # TODO(digest): pin after next pull → docker pull freeradius/freeradius-server:3.2.4 && docker image inspect freeradius/freeradius-server:3.2.4 --format '{{index .RepoDigests 0}}'
    build: ./freeradius
    network_mode: host
    environment:
      RADIUS_DB_HOST: 127.0.0.1
      RADIUS_DB_PORT: 5432
      RADIUS_DB_NAME: wasel
      RADIUS_DB_USER: wasel
      RADIUS_DB_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in compose env-file}
    depends_on:
      postgres:
        condition: service_healthy
      wireguard:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep freeradius || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0

  admin:
    build: ./admin
    ports:
      - '127.0.0.1:5173:5173'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:5173/ >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
