services:
  wireguard:
    image: lscr.io/linuxserver/wireguard
    container_name: wireguard
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /etc/wireguard:/config/wg_confs
      - /lib/modules:/lib/modules:ro
    healthcheck:
      test: ['CMD-SHELL', 'wg show wg0 2>/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  backend:
    build: ./backend
    network_mode: host
    cap_add:
      - NET_ADMIN
    env_file:
      - ./backend/.env
    volumes:
      - /etc/wireguard:/etc/wireguard
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      wireguard:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wasel
      POSTGRES_USER: wasel
      POSTGRES_PASSWORD: 53094ff06b673713c6392c1573f2ef2fc35fcb6563a55dd2d9eca5ee52e3ec8d
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wasel']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass fb456714f3a5df62538fbb1ef88381111af9fb3c597e431a1d461899960d4114
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  freeradius:
    build: ./freeradius
    network_mode: host
    environment:
      RADIUS_DB_HOST: 127.0.0.1
      RADIUS_DB_PORT: 5432
      RADIUS_DB_NAME: wasel
      RADIUS_DB_USER: wasel
      RADIUS_DB_PASS: 53094ff06b673713c6392c1573f2ef2fc35fcb6563a55dd2d9eca5ee52e3ec8d
    depends_on:
      postgres:
        condition: service_healthy
      wireguard:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep freeradius || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  admin:
    build: ./admin
    ports:
      - '5173:5173'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
