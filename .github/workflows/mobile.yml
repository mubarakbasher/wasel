name: Mobile CI

on:
  push:
    branches: [main, dev]
    paths: ['mobile/**']
  pull_request:
    branches: [main, dev]
    paths: ['mobile/**']
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart analyze --fatal-infos
      - run: flutter test

  build-apk:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # google-services.json is gitignored (Firebase config). Use the real config
      # from the GOOGLE_SERVICES_JSON secret (base64) when set; otherwise fall back
      # to a CI-only dummy so the debug build compiles. The dummy's Firebase/FCM is
      # non-functional, but CI only verifies the Android build — it never ships the APK.
      - name: Provision google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -e
          DEST=android/app/google-services.json
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > "$DEST"
            echo "Provisioned google-services.json from GOOGLE_SERVICES_JSON secret."
          else
            echo "::warning::GOOGLE_SERVICES_JSON secret not set — using a CI-only dummy (debug build only; Firebase/FCM non-functional). Add the secret for real config."
            echo '' | base64 -d > "$DEST"
          fi

      - run: flutter build apk --debug
