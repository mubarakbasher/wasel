name: Admin CI

on:
  push:
    branches: [main, dev]
    paths: ['admin/**']
  pull_request:
    branches: [main, dev]
    paths: ['admin/**']
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - uses: actions/checkout@v4
      - run: docker build ./admin
