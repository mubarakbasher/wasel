server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Static marketing page: no API, no remote origins of any kind.
    # style-src keeps 'unsafe-inline' for the same Tailwind/React inline-style
    # reason documented in admin/nginx.conf; script-src stays strict 'self'.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # Hashed bundles + fonts: cache hard. NOTE: `expires` (not a location-level
    # add_header) so the security headers above are still inherited — nginx
    # drops inherited add_header directives the moment a block adds its own.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }
    location /fonts/ {
        expires 1y;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
