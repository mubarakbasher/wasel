<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>حدث خطأ</title>
<style>
  @font-face { font-family: 'Cairo'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('cairo.woff2') format('woff2'); }
  @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('space-grotesk.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; background: #0f1420; color: #eef1f8; font-family: 'Cairo', system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif; }
  html[lang="en"] body { font-family: 'Space Grotesk', 'Cairo', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .glow { position: absolute; top: 0; left: 0; right: 0; height: 60%; background: radial-gradient(circle at 50% 30%, rgba(%WASEL_ACCENT_RGB%,0.16), rgba(%WASEL_ACCENT_RGB%,0) 60%); }
  .arcs { position: absolute; width: 520px; height: 520px; bottom: -190px; right: -170px; color: rgba(255,255,255,0.05); }
  [dir="ltr"] .arcs { right: auto; left: -170px; }
  .page { position: relative; z-index: 1; display: flex; min-height: 100vh; min-height: 100dvh; }
  .wrap { margin: auto; width: 100%; max-width: 400px; padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  .card { background: #1a2130; border: 1px solid #2a3347; border-radius: 18px; padding: 32px 24px; text-align: center; box-shadow: 0 24px 48px -28px rgba(0,0,0,0.65); }
  .icon { width: 60px; height: 60px; border-radius: 50%; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.35); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
  .icon svg { width: 28px; height: 28px; color: #fca5a5; }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 800; color: #eef1f8; }
  .sub { margin: 0 0 4px; font-size: 13.5px; font-weight: 600; color: #9aa3b8; word-wrap: break-word; overflow-wrap: break-word; }
  .err { margin: 0 0 22px; font-size: 14.5px; font-weight: 600; line-height: 1.6; color: #fca5a5; }
  .btn { display: flex; align-items: center; justify-content: center; height: 54px; width: 100%; font-family: inherit; font-size: 16px; font-weight: 700; color: #ffffff; text-decoration: none; background: %WASEL_ACCENT%; border-radius: 12px; box-shadow: 0 14px 30px -14px rgba(%WASEL_ACCENT_RGB%,0.65); }
  .btn:focus { outline: 3px solid rgba(%WASEL_ACCENT_RGB%,0.45); outline-offset: 2px; }
  .foot { display: flex; align-items: center; justify-content: center; margin: 20px 0 0; font-size: 13px; font-weight: 600; color: #9aa3b8; }
  .foot svg { width: 14px; height: 14px; color: #9aa3b8; margin: 0 0 0 6px; }
  [dir="ltr"] .foot svg { margin: 0 6px 0 0; }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="glow"></div>
    <svg class="arcs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
  </div>
  <div class="page">
    <div class="wrap">
      <div class="card">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        </div>
        <h1 data-i18n="title">تعذّر إكمال الطلب</h1>
        <p class="sub">%WASEL_NAME%</p>
        <p class="err"><span id="err-text">$(error)</span><span id="err-raw" style="display:none">$(error)</span><span id="err-orig" style="display:none">$(error-orig)</span></p>
        <a class="btn" href="$(link-login)" data-i18n="back">العودة لتسجيل الدخول</a>
      </div>
      <p class="foot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg><span data-i18n="poweredBy">مشغَّلة عبر منصة واصل</span></p>
    </div>
  </div>

<script type="text/javascript">
var I18N = {
  ar: { title: "تعذّر إكمال الطلب", back: "العودة لتسجيل الدخول", poweredBy: "مشغَّلة عبر منصة واصل" },
  en: { title: "Something went wrong", back: "Back to login", poweredBy: "Powered by Wasel" }
};
var ERRS = [
  ['disabled',   { ar: 'تم إيقاف هذا الرمز.', en: 'This code has been turned off.' }],
  ['data limit', { ar: 'استُهلكت بيانات هذا الرمز بالكامل.', en: "This code's data allowance is used up." }],
  ['time limit', { ar: 'انتهى وقت هذا الرمز.', en: "This code's time is used up." }],
  ['invalid username or password', { ar: 'رمز الدخول غير صحيح. تأكد من الرمز وحاول مرة أخرى.', en: "That code isn't right. Check it and try again." }],
  ['no more sessions', { ar: 'هذا الرمز مستخدم على جهاز آخر حالياً.', en: 'This code is already in use on another device.' }],
  ['simultaneous', { ar: 'هذا الرمز مستخدم على جهاز آخر حالياً.', en: 'This code is already in use on another device.' }],
  ['uptime limit', { ar: 'انتهى وقت هذا الرمز.', en: "This code's time is used up." }],
  ['traffic limit', { ar: 'استُهلكت بيانات هذا الرمز بالكامل.', en: "This code's data allowance is used up." }],
  ['not responding', { ar: 'الشبكة مشغولة حالياً. حاول مرة أخرى بعد لحظات.', en: 'The network is busy. Try again in a moment.' }],
  ['expired', { ar: 'انتهت صلاحية هذا الرمز.', en: 'This code has expired.' }],
  ['challenge response', { ar: 'أعد تحميل الصفحة وحاول مرة أخرى.', en: 'Reload the page and try again.' }]
];
function friendlyError(raw, lang) {
  var s = raw.toLowerCase();
  for (var i = 0; i < ERRS.length; i++) {
    if (s.indexOf(ERRS[i][0]) !== -1) { return ERRS[i][1][lang] || raw; }
  }
  return raw;
}
function getLang() {
  try { var v = localStorage.getItem('waselLang'); if (v === 'en' || v === 'ar') { return v; } } catch (e) {}
  return 'ar';
}
function applyLang(lang) {
  var t = I18N[lang] || I18N.ar;
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  var nodes = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < nodes.length; i++) {
    var k = nodes[i].getAttribute('data-i18n');
    if (t[k] != null) { nodes[i].textContent = t[k]; }
  }
  var raw = document.getElementById('err-raw');
  var orig = document.getElementById('err-orig');
  var out = document.getElementById('err-text');
  if (raw && out) { var src = (orig && orig.textContent.trim()) ? orig.textContent : raw.textContent; out.textContent = friendlyError(src, lang); }
}
applyLang(getLang());
</script>
</body>
</html>
