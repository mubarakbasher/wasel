<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Error</title>
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'Space Grotesk',sans-serif; background: #070912; }
  .card { width: 100%; max-width: 430px; background: rgba(18,22,38,0.72); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border: 1px solid rgba(120,140,220,0.18); border-radius: 26px; padding: 40px; text-align: center; box-shadow: 0 40px 90px -30px rgba(0,0,0,0.8); }
  .icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  h1 { margin: 0 0 8px; font-size: 21px; font-weight: 700; color: #f1f4ff; }
  .err { margin: 0 0 24px; font-size: 14.5px; color: #fca5a5; font-weight: 500; }
  .btn { display: inline-flex; align-items: center; justify-content: center; height: 50px; padding: 0 28px; font-size: 15px; font-weight: 600; color: #04121f; text-decoration: none; background: linear-gradient(135deg,#38bdf8,#22d3ee); border-radius: 13px; box-shadow: 0 0 30px -6px rgba(56,189,248,0.7); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fca5a5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    </div>
    <h1>Something went wrong</h1>
    <p class="err">$(error)</p>
    <a class="btn" href="$(link-login)">Back to login</a>
  </div>
</body>
</html>
