<!DOCTYPE html>
<!-- Render-only mock for the picker screenshot (preview.png, 500x920).
     NEVER pushed to routers — Google Fonts CDN is allowed here only. -->
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Midnight preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; width: 500px; height: 920px; overflow: hidden; position: relative; background: #0f1420; color: #eef1f8; font-family: 'Cairo', system-ui, sans-serif; }

  .bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; }
  .glow { position: absolute; top: 0; left: 0; right: 0; height: 60%; background: radial-gradient(circle at 50% 30%, rgba(29,78,216,0.16), rgba(29,78,216,0) 60%); }
  .arcs { position: absolute; width: 520px; height: 520px; bottom: -190px; right: -170px; color: rgba(255,255,255,0.05); }

  .wrap { position: relative; width: 100%; max-width: 430px; margin: 0 auto; padding: 48px 26px 0; }

  .lang-row { display: flex; justify-content: flex-end; }
  .lang-toggle { display: inline-flex; background: #1a2130; border: 1px solid #2a3347; border-radius: 999px; padding: 3px; }
  .lang-btn { min-height: 42px; min-width: 52px; padding: 0 16px; font-family: inherit; font-size: 14px; font-weight: 700; border: none; border-radius: 999px; background: transparent; color: #9aa3b8; }
  .lang-btn.active { background: #2a3347; color: #eef1f8; }

  .brand { text-align: center; margin: 222px 0 0; }
  .eyebrow { margin: 0 0 2px; font-size: 16px; font-weight: 600; color: #9aa3b8; }
  h1 { margin: 0; font-size: 30px; line-height: 1.35; font-weight: 800; color: #eef1f8; }
  .medal { position: relative; z-index: 2; width: 60px; height: 60px; margin: 20px auto -30px; border-radius: 50%; background: #1a2130; border: 1px solid #2a3347; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 24px -10px rgba(0,0,0,0.6); }
  .medal svg { width: 30px; height: 30px; color: #1d4ed8; }

  .panel { position: relative; background: #1a2130; border: 1px solid #2a3347; border-radius: 18px; box-shadow: 0 24px 48px -28px rgba(0,0,0,0.65); }
  .p-top { padding: 46px 24px 22px; }
  .p-div { height: 0; border-top: 1px solid #2a3347; }
  .p-bot { padding: 20px 24px 24px; }

  .code-label { display: block; font-size: 15px; font-weight: 700; color: #9aa3b8; margin-bottom: 9px; }
  .input { display: flex; align-items: center; width: 100%; height: 58px; padding: 0 16px; font-family: 'Space Grotesk', 'Cairo', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.04em; color: #eef1f8; background: #151c2b; border: 1.5px solid #46536f; border-radius: 12px; box-shadow: 0 0 0 4px rgba(29,78,216,0.40); direction: ltr; }
  .caret { display: inline-block; width: 2px; height: 24px; background: #eef1f8; margin-left: 2px; }

  .btn { height: 58px; width: 100%; display: flex; align-items: center; justify-content: center; font-family: inherit; font-size: 18px; font-weight: 700; color: #ffffff; background: #1d4ed8; border: none; border-radius: 12px; box-shadow: 0 14px 30px -14px rgba(29,78,216,0.65); }

  .foot { display: flex; align-items: center; justify-content: center; margin: 22px 0 0; font-size: 14px; font-weight: 600; color: #9aa3b8; }
  .foot svg { width: 15px; height: 15px; color: #9aa3b8; margin-left: 6px; }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="glow"></div>
    <svg class="arcs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
  </div>
  <div class="wrap">
    <div class="lang-row">
      <div class="lang-toggle">
        <button type="button" class="lang-btn active">عربي</button>
        <button type="button" class="lang-btn">EN</button>
      </div>
    </div>

    <div class="brand">
      <p class="eyebrow">أهلاً بك في</p>
      <h1>مطعم النيل الأزرق</h1>
    </div>

    <div class="medal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
    </div>

    <div class="panel">
      <div class="p-top">
        <span class="code-label">رمز الدخول</span>
        <div class="input"><span>Xk4p7Rm2</span><span class="caret"></span></div>
      </div>
      <div class="p-div"></div>
      <div class="p-bot">
        <div class="btn">الاتصال بالإنترنت</div>
      </div>
    </div>

    <p class="foot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg><span>مشغَّلة عبر منصة واصل</span></p>
  </div>
</body>
</html>
