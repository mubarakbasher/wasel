<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logged Out</title>
<style>
  @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('space-grotesk.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'Space Grotesk',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background: #070912; }
  .card { width: 100%; max-width: 430px; background: rgba(18,22,38,0.72); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border: 1px solid rgba(120,140,220,0.18); border-radius: 26px; padding: 40px; text-align: center; box-shadow: 0 40px 90px -30px rgba(0,0,0,0.8); }
  .icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.25); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; color: #f1f4ff; }
  p { margin: 0 0 24px; font-size: 14px; color: #8b93b5; font-weight: 400; }
  .btn { display: inline-flex; align-items: center; justify-content: center; height: 50px; padding: 0 28px; font-size: 15px; font-weight: 600; color: #04121f; text-decoration: none; background: linear-gradient(135deg,#38bdf8,#22d3ee); border-radius: 13px; box-shadow: 0 0 30px -6px rgba(56,189,248,0.7); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </div>
    <h1>You are logged out</h1>
    <p>You have been disconnected from the Wi-Fi network. Uptime: $(uptime)</p>
    <a class="btn" href="$(link-login)">Log in again</a>
  </div>
</body>
</html>
