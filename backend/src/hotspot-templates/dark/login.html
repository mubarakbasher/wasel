<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wi-Fi Login</title>
$(if chap-id)<script type="text/javascript" src="md5.js"></script>$(endif)
<style>
  @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('space-grotesk.woff2') format('woff2'); }
  @font-face { font-family: 'Cairo'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('cairo.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes gridDrift { 0% { background-position: 0 0; } 100% { background-position: 56px 56px; } }
  @keyframes auroraA { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,-30px) scale(1.1); } }
  @keyframes auroraB { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,40px) scale(1.15); } }
  body { position: relative; min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'Space Grotesk','Cairo',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background: #070912; overflow: hidden; }
  .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(120,140,255,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(120,140,255,0.06) 1px, transparent 1px); background-size: 56px 56px; animation: gridDrift 12s linear infinite; pointer-events: none; }
  .aurora-a { position: absolute; top: -160px; left: -120px; width: 520px; height: 520px; background: radial-gradient(circle at center, rgba(56,189,248,0.35), rgba(56,189,248,0) 65%); animation: auroraA 11s ease-in-out infinite; pointer-events: none; }
  .aurora-b { position: absolute; bottom: -200px; right: -140px; width: 560px; height: 560px; background: radial-gradient(circle at center, rgba(139,92,246,0.4), rgba(139,92,246,0) 66%); animation: auroraB 13s ease-in-out infinite; pointer-events: none; }
  .wrap { position: relative; width: 100%; max-width: 430px; }
  .card { position: relative; background: rgba(18,22,38,0.72); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border: 1px solid rgba(120,140,220,0.18); border-radius: 26px; padding: 34px 38px 38px; box-shadow: 0 40px 90px -30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.06); }
  .lang-row { display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .lang-toggle { display: inline-flex; background: rgba(10,14,26,0.6); border: 1px solid rgba(120,140,220,0.18); border-radius: 999px; padding: 3px; gap: 2px; }
  .lang-btn { font-family: 'Space Grotesk',sans-serif; font-size: 12.5px; font-weight: 600; padding: 7px 16px; border: none; border-radius: 999px; cursor: pointer; transition: all .15s; background: transparent; color: #8b93b5; }
  .lang-btn.ar { font-family: 'Cairo',sans-serif; font-size: 13px; font-weight: 700; }
  .lang-btn.active { background: rgba(56,189,248,0.16); color: #7dd3fc; }
  .brand { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; margin-bottom: 28px; }
  .brand-logo { position: relative; width: 84px; height: 84px; border-radius: 22px; background: linear-gradient(150deg, rgba(56,189,248,0.18), rgba(139,92,246,0.18)); border: 1px solid rgba(120,140,220,0.28); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px -8px rgba(56,189,248,0.5); }
  .brand-logo svg { width: 48px; height: 48px; color: #eaf6ff; }
  .brand-text { display: flex; flex-direction: column; gap: 7px; }
  .pill { align-self: center; font-size: 10.5px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #7dd3fc; background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.25); padding: 5px 13px; border-radius: 999px; }
  .brand h1 { margin: 0; font-size: 25px; font-weight: 700; color: #f1f4ff; letter-spacing: -0.01em; }
  .brand p { margin: 0; font-size: 14px; color: #8b93b5; font-weight: 400; }
  .error-box { display: flex; align-items: center; gap: 10px; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; font-size: 13.5px; font-weight: 500; padding: 12px 14px; border-radius: 13px; margin-bottom: 18px; }
  .error-box svg { flex: none; }
  form { display: flex; flex-direction: column; gap: 13px; }
  .field { position: relative; display: block; }
  .field .icon { position: absolute; inset-inline-start: 16px; top: 50%; transform: translateY(-50%); color: #6b73a0; display: flex; pointer-events: none; }
  .input { width: 100%; height: 54px; padding-block: 0; padding-inline-start: 46px; padding-inline-end: 16px; font-family: inherit; font-size: 16px; font-weight: 600; letter-spacing: 0.08em; color: #eaeefc; background: rgba(10,14,26,0.55); border: 1.5px solid rgba(120,140,220,0.2); border-radius: 13px; outline: none; transition: border-color .15s, box-shadow .15s; }
  .input::placeholder { font-weight: 400; letter-spacing: 0; color: #6b73a0; }
  .input:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56,189,248,0.14); }
  .btn { margin-top: 6px; height: 54px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; font-size: 15.5px; font-weight: 600; color: #04121f; background: linear-gradient(135deg,#38bdf8,#22d3ee); border: none; border-radius: 13px; cursor: pointer; box-shadow: 0 0 30px -6px rgba(56,189,248,0.7); transition: transform .12s, box-shadow .2s; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 0 40px -4px rgba(56,189,248,0.9); }
  .btn:active { transform: translateY(0); }
  .btn[disabled] { background: #3a6f86; cursor: not-allowed; opacity: .85; }
  .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(4,18,31,0.35); border-top-color: #04121f; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  .btn-label { white-space: nowrap; }
  .footer-info { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 24px; padding-top: 22px; border-top: 1px solid rgba(120,140,220,0.14); }
  .footer-info .chip { display: flex; align-items: center; gap: 7px; color: #8b93b5; font-size: 12.5px; font-weight: 500; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(120,140,220,0.4); }
  .foot { text-align: center; margin: 22px 0 0; font-size: 12.5px; color: #6b73a0; font-weight: 400; }
  .foot b { font-weight: 600; color: #9fb4e8; }
  .tip { display: flex; align-items: flex-start; gap: 8px; margin-top: 16px; padding: 11px 13px; background: rgba(56,189,248,0.07); border: 1px solid rgba(56,189,248,0.2); border-radius: 12px; font-size: 12.5px; line-height: 1.45; color: #9aa3c4; font-weight: 400; }
  .tip svg { flex: none; margin-top: 1px; color: #7dd3fc; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="aurora-a"></div>
  <div class="aurora-b"></div>
  <div class="wrap">
    <div class="card">
      <div class="lang-row">
        <div class="lang-toggle">
          <button type="button" id="btn-en" class="lang-btn active" onclick="setLang('en')">EN</button>
          <button type="button" id="btn-ar" class="lang-btn ar" onclick="setLang('ar')">عربي</button>
        </div>
      </div>

      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
        </div>
        <div class="brand-text">
          <span class="pill" data-i18n="pill">Wasel</span>
          <h1 data-i18n="brand">Riverside Café</h1>
          <p data-i18n="tag">Complimentary Wi-Fi for our guests</p>
        </div>
      </div>

      $(if error)
      <div class="error-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span>$(error)</span>
      </div>
      $(endif)

      <form name="login" action="$(link-login-only)" method="post" onsubmit="return doLogin()">
        <input type="hidden" name="dst" value="$(link-orig)">
        <input type="hidden" name="popup" value="true">
        <input type="hidden" name="password">
        <label class="field">
          <span class="icon">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H4v4"></path><path d="M2 7h20v3a2 2 0 0 0 0 4v3H2v-3a2 2 0 0 0 0-4z"></path><path d="M12 5v14" stroke-dasharray="2 3"></path></svg>
          </span>
          <input class="input" type="text" name="username" inputmode="numeric" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" data-i18n-ph="phVoucher" placeholder="Enter access code" autofocus>
        </label>
        <button class="btn" type="submit"><span class="spinner" hidden></span><span class="btn-label" data-i18n="connect">Connect to Wi-Fi</span></button>
      </form>

      <p class="tip">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5.76.76 1.23 1.52 1.41 2.5"></path></svg>
        <span data-i18n="tip">Tip: allow your device to reconnect automatically to stay online.</span>
      </p>

      <div class="footer-info">
        <div class="chip">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <span data-i18n="secured">Secured</span>
        </div>
        <span class="dot"></span>
        <div class="chip">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline></svg>
          <span data-i18n="highSpeed">High speed</span>
        </div>
      </div>
    </div>
    <p class="foot"><span data-i18n="footerPre">Connected via </span><b data-i18n="brand">Riverside Café</b><span data-i18n="footerPost"> · Need help? Ask our staff</span></p>
  </div>

<script type="text/javascript">
function doLogin() {
  // Wasel vouchers: username == password (the access code). Always set password = code.
  document.login.password.value = document.login.username.value;
  $(if chap-id)document.login.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');$(endif)
  var btn = document.querySelector('.btn');
  var sp = document.querySelector('.spinner');
  if (btn) { btn.setAttribute('disabled', 'disabled'); }
  if (sp) { sp.hidden = false; }
  return true;
}

var I18N = {
  en: {
    pill: "Wasel", brand: "Riverside Café", tag: "Complimentary Wi-Fi for our guests",
    phVoucher: "Enter access code", connect: "Connect to Wi-Fi",
    secured: "Secured", highSpeed: "High speed",
    footerPre: "Connected via ", footerPost: " · Need help? Ask our staff",
    tip: "Tip: allow your device to reconnect automatically to stay online."
  },
  ar: {
    pill: "واصل", brand: "مقهى ريفرسايد", tag: "واي فاي مجاني لضيوفنا الكرام",
    phVoucher: "أدخل رمز الدخول", connect: "الاتصال بالواي فاي",
    secured: "آمن", highSpeed: "سرعة عالية",
    footerPre: "متصل عبر ", footerPost: " · تحتاج مساعدة؟ اسأل فريقنا",
    tip: "نصيحة: اسمح لجهازك بإعادة الاتصال تلقائيًا للبقاء على الإنترنت."
  }
};
function setLang(lang) {
  var t = I18N[lang] || I18N.en;
  document.documentElement.lang = (lang === 'ar') ? 'ar' : 'en';
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  var nodes = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < nodes.length; i++) {
    var k = nodes[i].getAttribute('data-i18n');
    if (t[k] != null) nodes[i].textContent = t[k];
  }
  var phs = document.querySelectorAll('[data-i18n-ph]');
  for (var j = 0; j < phs.length; j++) {
    var pk = phs[j].getAttribute('data-i18n-ph');
    if (t[pk] != null) phs[j].setAttribute('placeholder', t[pk]);
  }
  document.getElementById('btn-en').classList.toggle('active', lang !== 'ar');
  document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
}
setLang('en');
</script>
</body>
</html>
