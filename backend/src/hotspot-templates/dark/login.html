<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>الاتصال بالواي فاي</title>
$(if chap-id)<script type="text/javascript" src="md5.js"></script>$(endif)
<style>
  /* Midnight (ليل) — evening café: flat layered dark surfaces, one pool of
     warm light where the action is. Captive-browser rules: no external
     requests, no logical properties, literal accent hex (no CSS vars),
     body must scroll, ES5 only. Accent hexes are curated for WHITE text ON
     accent — on this dark page the raw accent is used only for the button
     fill, the focus ring, the soft glow and the logo medallion arcs. */
  @font-face { font-family: 'Cairo'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('cairo.woff2') format('woff2'); }
  @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('space-grotesk.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; background: #0f1420; color: #eef1f8; font-family: 'Cairo', system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif; }
  html[lang="en"] body { font-family: 'Space Grotesk', 'Cairo', system-ui, -apple-system, 'Segoe UI', sans-serif; }

  .bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .glow { position: absolute; top: 0; left: 0; right: 0; height: 60%; background: radial-gradient(circle at 50% 30%, rgba(%WASEL_ACCENT_RGB%,0.16), rgba(%WASEL_ACCENT_RGB%,0) 60%); }
  .arcs { position: absolute; width: 520px; height: 520px; bottom: -190px; right: -170px; color: rgba(255,255,255,0.05); }
  [dir="ltr"] .arcs { right: auto; left: -170px; }

  .page { position: relative; z-index: 1; display: flex; min-height: 100vh; min-height: 100dvh; }
  .wrap { margin: auto; width: 100%; max-width: 400px; padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }

  .lang-row { display: flex; justify-content: flex-end; margin-bottom: 4px; }
  .lang-toggle { display: inline-flex; background: #1a2130; border: 1px solid #2a3347; border-radius: 999px; padding: 3px; }
  .lang-btn { min-height: 44px; min-width: 52px; padding: 0 16px; font-family: inherit; font-size: 14px; font-weight: 700; border: none; border-radius: 999px; cursor: pointer; background: transparent; color: #9aa3b8; }
  .lang-btn.active { background: #2a3347; color: #eef1f8; }

  .brand { text-align: center; margin: 8px 0 0; }
  .eyebrow { margin: 0 0 2px; font-size: 15px; font-weight: 600; color: #9aa3b8; }
  h1 { margin: 0; font-size: 27px; line-height: 1.35; font-weight: 800; color: #eef1f8; word-wrap: break-word; overflow-wrap: break-word; }
  .medal { position: relative; z-index: 2; width: 60px; height: 60px; margin: 18px auto -30px; border-radius: 50%; background: #1a2130; border: 1px solid #2a3347; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 24px -10px rgba(0,0,0,0.6); }
  .medal svg { width: 30px; height: 30px; color: #eef1f8; }

  .panel { position: relative; background: #1a2130; border: 1px solid #2a3347; border-radius: 18px; box-shadow: 0 24px 48px -28px rgba(0,0,0,0.65); }
  .p-top { padding: 44px 22px 20px; }
  .p-div { height: 0; border-top: 1px solid #2a3347; }
  .p-bot { padding: 18px 22px 22px; }

  .error-box { display: flex; align-items: flex-start; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.35); color: #fca5a5; font-size: 14px; font-weight: 600; line-height: 1.5; padding: 12px 14px; border-radius: 12px; margin-bottom: 16px; }
  .error-box svg { flex: none; margin-top: 3px; }
  .error-box span { padding: 0 10px 0 0; }
  [dir="ltr"] .error-box span { padding: 0 0 0 10px; }

  .code-label { display: block; font-size: 14px; font-weight: 700; color: #9aa3b8; margin-bottom: 8px; }
  .input { display: block; width: 100%; height: 56px; padding: 0 16px; font-family: 'Space Grotesk', 'Cairo', sans-serif; font-size: 17px; font-weight: 600; letter-spacing: 0.04em; color: #eef1f8; background: #121826; border: 1.5px solid #2a3347; border-radius: 12px; outline: none; }
  .input::placeholder { font-family: inherit; font-weight: 400; letter-spacing: 0; color: #7e88a3; }
  .input:focus { border-color: #46536f; background: #151c2b; box-shadow: 0 0 0 4px rgba(%WASEL_ACCENT_RGB%,0.40); }

  .btn { height: 56px; width: 100%; display: flex; align-items: center; justify-content: center; font-family: inherit; font-size: 17px; font-weight: 700; color: #ffffff; background: %WASEL_ACCENT%; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 14px 30px -14px rgba(%WASEL_ACCENT_RGB%,0.65); }
  .btn:focus { outline: 3px solid rgba(%WASEL_ACCENT_RGB%,0.45); outline-offset: 2px; }
  .btn:active { box-shadow: none; }
  .btn[disabled] { opacity: 0.7; cursor: default; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #ffffff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; margin: 0 0 0 10px; }
  .spinner[hidden] { display: none; }
  [dir="ltr"] .spinner { margin: 0 10px 0 0; }
  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }

  .foot { display: flex; align-items: center; justify-content: center; margin: 20px 0 0; font-size: 13px; font-weight: 600; color: #9aa3b8; }
  .foot svg { width: 14px; height: 14px; color: #9aa3b8; margin: 0 0 0 6px; }
  [dir="ltr"] .foot svg { margin: 0 6px 0 0; }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="glow"></div>
    <svg class="arcs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
  </div>
  <div class="page">
    <div class="wrap">
      <div class="lang-row">
        <div class="lang-toggle">
          <button type="button" id="btn-ar" class="lang-btn active" onclick="setLang('ar')">عربي</button>
          <button type="button" id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
      </div>

      <div class="brand">
        <p class="eyebrow" data-i18n="eyebrow">أهلاً بك في</p>
        <h1>%WASEL_NAME%</h1>
      </div>

      <div class="medal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
      </div>

      <div class="panel">
        <div class="p-top">
          $(if error)
          <div class="error-box">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span id="err-text">$(error)</span>
            <span id="err-raw" style="display:none">$(error)</span>
          </div>
          $(endif)
          <form name="login" action="$(link-login-only)" method="post" onsubmit="return doLogin()">
            <input type="hidden" name="dst" value="$(link-orig)">
            <input type="hidden" name="popup" value="true">
            <input type="hidden" name="password">
            <label class="code-label" for="code" data-i18n="codeLabel">رمز الدخول</label>
            <input class="input" id="code" type="text" name="username" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="go" data-i18n-ph="phCode" placeholder="اكتب الرمز المطبوع على الكرت">
        </div>
        <div class="p-div"></div>
        <div class="p-bot">
            <button class="btn" type="submit"><span class="btn-label" data-i18n="connect">الاتصال بالإنترنت</span><span class="spinner" hidden></span></button>
          </form>
        </div>
      </div>

      <p class="foot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg><span data-i18n="poweredBy">مشغَّلة عبر منصة واصل</span></p>
    </div>
  </div>

<script type="text/javascript">
function doLogin() {
  // Wasel vouchers: username == password (the access code). Codes are case-sensitive.
  var u = document.login.username.value.replace(/^\s+|\s+$/g, '');
  document.login.username.value = u;
  document.login.password.value = u;
  $(if chap-id)document.login.password.value = hexMD5('$(chap-id)' + u + '$(chap-challenge)');$(endif)
  var btn = document.querySelector('.btn');
  var sp = document.querySelector('.spinner');
  if (btn) { btn.setAttribute('disabled', 'disabled'); }
  if (sp) { sp.hidden = false; }
  return true;
}

var I18N = {
  ar: {
    eyebrow: "أهلاً بك في",
    codeLabel: "رمز الدخول",
    phCode: "اكتب الرمز المطبوع على الكرت",
    connect: "الاتصال بالإنترنت",
    poweredBy: "مشغَّلة عبر منصة واصل"
  },
  en: {
    eyebrow: "Welcome to",
    codeLabel: "Access code",
    phCode: "Enter your voucher code",
    connect: "Connect to Wi-Fi",
    poweredBy: "Powered by Wasel"
  }
};

var ERRS = [
  ['invalid username or password', { ar: 'رمز الدخول غير صحيح. تأكد من الرمز وحاول مرة أخرى.', en: "That code isn't right. Check it and try again." }],
  ['no more sessions', { ar: 'هذا الرمز مستخدم على جهاز آخر حالياً.', en: 'This code is already in use on another device.' }],
  ['simultaneous', { ar: 'هذا الرمز مستخدم على جهاز آخر حالياً.', en: 'This code is already in use on another device.' }],
  ['uptime limit', { ar: 'انتهى وقت هذا الرمز.', en: "This code's time is used up." }],
  ['traffic limit', { ar: 'استُهلكت بيانات هذا الرمز بالكامل.', en: "This code's data allowance is used up." }],
  ['not responding', { ar: 'الشبكة مشغولة حالياً. حاول مرة أخرى بعد لحظات.', en: 'The network is busy. Try again in a moment.' }],
  ['expired', { ar: 'انتهت صلاحية هذا الرمز.', en: 'This code has expired.' }],
  ['challenge response', { ar: 'أعد تحميل الصفحة وحاول مرة أخرى.', en: 'Reload the page and try again.' }]
];
function friendlyError(raw, lang) {
  var s = raw.toLowerCase();
  for (var i = 0; i < ERRS.length; i++) {
    if (s.indexOf(ERRS[i][0]) !== -1) { return ERRS[i][1][lang] || raw; }
  }
  return raw;
}

function getLang() {
  try { var v = localStorage.getItem('waselLang'); if (v === 'en' || v === 'ar') { return v; } } catch (e) {}
  return 'ar';
}
function applyLang(lang) {
  var t = I18N[lang] || I18N.ar;
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  var nodes = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < nodes.length; i++) {
    var k = nodes[i].getAttribute('data-i18n');
    if (t[k] != null) { nodes[i].textContent = t[k]; }
  }
  var phs = document.querySelectorAll('[data-i18n-ph]');
  for (var j = 0; j < phs.length; j++) {
    var pk = phs[j].getAttribute('data-i18n-ph');
    if (t[pk] != null) { phs[j].setAttribute('placeholder', t[pk]); }
  }
  var raw = document.getElementById('err-raw');
  var out = document.getElementById('err-text');
  if (raw && out) { out.textContent = friendlyError(raw.textContent || raw.innerText || '', lang); }
  var ab = document.getElementById('btn-ar');
  var eb = document.getElementById('btn-en');
  if (ab) { ab.className = 'lang-btn' + (lang === 'ar' ? ' active' : ''); }
  if (eb) { eb.className = 'lang-btn' + (lang === 'en' ? ' active' : ''); }
}
function setLang(lang) {
  try { localStorage.setItem('waselLang', lang); } catch (e) {}
  applyLang(lang);
}
applyLang(getLang());
</script>
</body>
</html>
