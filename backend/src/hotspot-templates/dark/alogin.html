<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connecting…</title>
<meta http-equiv="refresh" content="2; url=$(link-redirect)">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<style>
  @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('space-grotesk.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'Space Grotesk',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background: #070912; }
  .card { width: 100%; max-width: 430px; background: rgba(18,22,38,0.72); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border: 1px solid rgba(120,140,220,0.18); border-radius: 26px; padding: 44px 40px; text-align: center; box-shadow: 0 40px 90px -30px rgba(0,0,0,0.8); }
  .spinner { width: 44px; height: 44px; border: 4px solid rgba(120,140,220,0.2); border-top-color: #38bdf8; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 22px; }
  h1 { margin: 0 0 8px; font-size: 21px; font-weight: 700; color: #f1f4ff; }
  p { margin: 0; font-size: 14px; color: #8b93b5; font-weight: 400; }
  a { color: #7dd3fc; font-weight: 600; text-decoration: none; }
</style>
<script language="JavaScript">
<!--
function startRedirect() {
$(if popup == 'true')
  open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=320,height=420');
$(endif)
  location.href = '$(link-redirect)';
}
//-->
</script>
</head>
<body onload="startRedirect()">
  <div class="card">
    <div class="spinner"></div>
    <h1>You're connected</h1>
    <p>Taking you online… If nothing happens, <a href="$(link-redirect)">tap here to continue</a>.</p>
  </div>
</body>
</html>
