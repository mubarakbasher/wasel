<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wi-Fi Login</title>
$(if chap-id)<script type="text/javascript" src="md5.js"></script>$(endif)
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blob { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-16px) scale(1.08); } }
  body { position: relative; min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'DM Sans','Cairo',sans-serif; background: #f4ede2; overflow: hidden; }
  .blob-a { position: absolute; top: -140px; inset-inline-start: -100px; width: 440px; height: 440px; background: radial-gradient(circle at center, rgba(232,160,92,0.35), rgba(232,160,92,0) 66%); animation: blob 10s ease-in-out infinite; pointer-events: none; }
  .blob-b { position: absolute; bottom: -180px; inset-inline-end: -120px; width: 480px; height: 480px; background: radial-gradient(circle at center, rgba(193,108,74,0.28), rgba(193,108,74,0) 66%); pointer-events: none; }
  .wrap { position: relative; width: 100%; max-width: 430px; }
  .card { background: #fffdf9; border: 1px solid #ece2d2; border-radius: 28px; overflow: hidden; box-shadow: 0 30px 70px -32px rgba(120,80,40,0.4), 0 2px 8px rgba(120,80,40,0.05); }
  .hero { position: relative; background: linear-gradient(150deg,#c1503a,#e08a3c); padding: 30px 38px 26px; overflow: hidden; }
  .hero-c1 { position: absolute; top: -60px; inset-inline-end: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.08); pointer-events: none; }
  .hero-c2 { position: absolute; bottom: -90px; inset-inline-start: -30px; width: 180px; height: 180px; border-radius: 50%; background: rgba(255,255,255,0.06); pointer-events: none; }
  .lang-row { position: relative; display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .lang-toggle { display: inline-flex; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.28); border-radius: 999px; padding: 3px; gap: 2px; }
  .lang-btn { font-family: 'DM Sans',sans-serif; font-size: 12.5px; font-weight: 700; padding: 6px 15px; border: none; border-radius: 999px; cursor: pointer; transition: all .15s; background: transparent; color: #fff3e6; }
  .lang-btn.ar { font-family: 'Cairo',sans-serif; font-size: 13px; }
  .lang-btn.active { background: rgba(255,255,255,0.92); color: #c1503a; }
  .brand-head { position: relative; display: flex; align-items: center; gap: 16px; }
  .brand-logo { flex: none; width: 62px; height: 62px; border-radius: 18px; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px -8px rgba(80,30,10,0.5); }
  .brand-logo svg { width: 36px; height: 36px; color: #c1503a; }
  .brand-text { display: flex; flex-direction: column; gap: 4px; }
  .pill { align-self: flex-start; font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #fff3e6; background: rgba(255,255,255,0.18); padding: 3px 10px; border-radius: 999px; }
  .brand-text h1 { margin: 0; font-family: 'Fraunces',serif; font-size: 26px; font-weight: 600; color: #fffaf3; letter-spacing: -0.01em; }
  .tag { position: relative; margin: 14px 0 0; font-size: 14px; color: #ffe9d4; font-weight: 400; line-height: 1.5; }
  .body { padding: 28px 38px 34px; }
  .error-box { display: flex; align-items: center; gap: 10px; background: #fdeceb; border: 1px solid #f5cdc8; color: #b23b2c; font-size: 13.5px; font-weight: 600; padding: 12px 14px; border-radius: 14px; margin-bottom: 18px; }
  .error-box svg { flex: none; }
  form { display: flex; flex-direction: column; gap: 13px; }
  .field { position: relative; display: block; }
  .field .icon { position: absolute; inset-inline-start: 16px; top: 50%; transform: translateY(-50%); color: #b89a7a; display: flex; pointer-events: none; }
  .input { width: 100%; height: 54px; padding-block: 0; padding-inline-start: 46px; padding-inline-end: 16px; font-family: inherit; font-size: 16px; font-weight: 600; letter-spacing: 0.06em; color: #3a2c1e; background: #f8f1e7; border: 1.5px solid #ece2d2; border-radius: 14px; outline: none; transition: border-color .15s, box-shadow .15s, background .15s; }
  .input::placeholder { font-weight: 500; letter-spacing: 0; color: #b89a7a; }
  .input:focus { border-color: #c1503a; background: #fffdf9; box-shadow: 0 0 0 4px rgba(193,80,58,0.12); }
  .btn { margin-top: 6px; height: 54px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; font-size: 15.5px; font-weight: 700; color: #fffaf3; background: linear-gradient(150deg,#c1503a,#e08a3c); border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 14px 26px -12px rgba(193,80,58,0.65); transition: transform .12s, box-shadow .2s; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 18px 30px -12px rgba(193,80,58,0.8); }
  .btn:active { transform: translateY(0); }
  .btn[disabled] { background: #d39a7e; cursor: not-allowed; opacity: .85; }
  .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  .btn-label { white-space: nowrap; }
  .footer-info { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 24px; padding-top: 22px; border-top: 1px solid #f1e8d9; }
  .footer-info .chip { display: flex; align-items: center; gap: 7px; color: #a08763; font-size: 12.5px; font-weight: 600; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: #dccab0; }
  .foot { text-align: center; margin: 22px 0 0; font-size: 12.5px; color: #a08763; font-weight: 500; }
  .foot b { font-weight: 700; color: #7d5a3a; }
</style>
</head>
<body>
  <div class="blob-a"></div>
  <div class="blob-b"></div>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="hero-c1"></div>
        <div class="hero-c2"></div>
        <div class="lang-row">
          <div class="lang-toggle">
            <button type="button" id="btn-en" class="lang-btn active" onclick="setLang('en')">EN</button>
            <button type="button" id="btn-ar" class="lang-btn ar" onclick="setLang('ar')">عربي</button>
          </div>
        </div>
        <div class="brand-head">
          <div class="brand-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
          </div>
          <div class="brand-text">
            <span class="pill" data-i18n="pill">Wasel</span>
            <h1 data-i18n="brand">Riverside Café</h1>
          </div>
        </div>
        <p class="tag" data-i18n="tag">Complimentary Wi-Fi for our guests</p>
      </div>

      <div class="body">
        $(if error)
        <div class="error-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span>$(error)</span>
        </div>
        $(endif)

        <form name="login" action="$(link-login-only)" method="post" onsubmit="return doLogin()">
          <input type="hidden" name="dst" value="$(link-orig)">
          <input type="hidden" name="popup" value="true">
          <input type="hidden" name="password">
          <label class="field">
            <span class="icon">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H4v4"></path><path d="M2 7h20v3a2 2 0 0 0 0 4v3H2v-3a2 2 0 0 0 0-4z"></path><path d="M12 5v14" stroke-dasharray="2 3"></path></svg>
            </span>
            <input class="input" type="text" name="username" inputmode="numeric" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" data-i18n-ph="phVoucher" placeholder="Enter access code" autofocus>
          </label>
          <button class="btn" type="submit"><span class="spinner" hidden></span><span class="btn-label" data-i18n="connect">Connect to Wi-Fi</span></button>
        </form>

        <div class="footer-info">
          <div class="chip">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5a9e4b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <span data-i18n="secured">Secured</span>
          </div>
          <span class="dot"></span>
          <div class="chip">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c1503a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline></svg>
            <span data-i18n="highSpeed">High speed</span>
          </div>
        </div>
      </div>
    </div>
    <p class="foot"><span data-i18n="footerPre">Connected via </span><b data-i18n="brand">Riverside Café</b><span data-i18n="footerPost"> · Need help? Ask our staff</span></p>
  </div>

<script type="text/javascript">
function doLogin() {
  // Wasel vouchers: username == password (the access code). Always set password = code.
  document.login.password.value = document.login.username.value;
  $(if chap-id)document.login.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');$(endif)
  var btn = document.querySelector('.btn');
  var sp = document.querySelector('.spinner');
  if (btn) { btn.setAttribute('disabled', 'disabled'); }
  if (sp) { sp.hidden = false; }
  return true;
}

var I18N = {
  en: {
    pill: "Wasel", brand: "Riverside Café", tag: "Complimentary Wi-Fi for our guests",
    phVoucher: "Enter access code", connect: "Connect to Wi-Fi",
    secured: "Secured", highSpeed: "High speed",
    footerPre: "Connected via ", footerPost: " · Need help? Ask our staff"
  },
  ar: {
    pill: "واصل", brand: "مقهى ريفرسايد", tag: "واي فاي مجاني لضيوفنا الكرام",
    phVoucher: "أدخل رمز الدخول", connect: "الاتصال بالواي فاي",
    secured: "آمن", highSpeed: "سرعة عالية",
    footerPre: "متصل عبر ", footerPost: " · تحتاج مساعدة؟ اسأل فريقنا"
  }
};
function setLang(lang) {
  var t = I18N[lang] || I18N.en;
  document.documentElement.lang = (lang === 'ar') ? 'ar' : 'en';
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  var nodes = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < nodes.length; i++) {
    var k = nodes[i].getAttribute('data-i18n');
    if (t[k] != null) nodes[i].textContent = t[k];
  }
  var phs = document.querySelectorAll('[data-i18n-ph]');
  for (var j = 0; j < phs.length; j++) {
    var pk = phs[j].getAttribute('data-i18n-ph');
    if (t[pk] != null) phs[j].setAttribute('placeholder', t[pk]);
  }
  document.getElementById('btn-en').classList.toggle('active', lang !== 'ar');
  document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
}
setLang('en');
</script>
</body>
</html>
