<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logged Out</title>
<style>
  @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('dm-sans.woff2') format('woff2'); }
  @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 500 700; font-display: swap; src: url('fraunces.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'DM Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background: #f4ede2; }
  .card { width: 100%; max-width: 430px; background: #fffdf9; border: 1px solid #ece2d2; border-radius: 28px; padding: 40px; text-align: center; box-shadow: 0 30px 70px -32px rgba(120,80,40,0.4); }
  .icon { width: 64px; height: 64px; border-radius: 50%; background: #f8f1e7; border: 1px solid #ece2d2; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  h1 { margin: 0 0 8px; font-family: 'Fraunces',serif; font-size: 24px; font-weight: 600; color: #3a2c1e; }
  p { margin: 0 0 24px; font-size: 14.5px; color: #a08763; font-weight: 500; }
  .btn { display: inline-flex; align-items: center; justify-content: center; height: 50px; padding: 0 28px; font-size: 15px; font-weight: 700; color: #fffaf3; text-decoration: none; background: linear-gradient(150deg,#c1503a,#e08a3c); border-radius: 14px; box-shadow: 0 14px 26px -12px rgba(193,80,58,0.65); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#c1503a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </div>
    <h1>You are logged out</h1>
    <p>You have been disconnected from the Wi-Fi network. Uptime: $(uptime)</p>
    <a class="btn" href="$(link-login)">Log in again</a>
  </div>
</body>
</html>
