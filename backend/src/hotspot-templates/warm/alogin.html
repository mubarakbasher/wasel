<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connecting…</title>
<meta http-equiv="refresh" content="2; url=$(link-redirect)">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<style>
  @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 400 700; font-display: swap; src: url('dm-sans.woff2') format('woff2'); }
  @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 500 700; font-display: swap; src: url('fraunces.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'DM Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background: #f4ede2; }
  .card { width: 100%; max-width: 430px; background: #fffdf9; border: 1px solid #ece2d2; border-radius: 28px; padding: 44px 40px; text-align: center; box-shadow: 0 30px 70px -32px rgba(120,80,40,0.4); }
  .spinner { width: 44px; height: 44px; border: 4px solid #f3ecdf; border-top-color: #c1503a; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 22px; }
  h1 { margin: 0 0 8px; font-family: 'Fraunces',serif; font-size: 23px; font-weight: 600; color: #3a2c1e; }
  p { margin: 0; font-size: 14px; color: #a08763; font-weight: 500; }
  a { color: #c1503a; font-weight: 700; text-decoration: none; }
</style>
<script language="JavaScript">
<!--
function startRedirect() {
$(if popup == 'true')
  open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=320,height=420');
$(endif)
  location.href = '$(link-redirect)';
}
//-->
</script>
</head>
<body onload="startRedirect()">
  <div class="card">
    <div class="spinner"></div>
    <h1>You're connected</h1>
    <p>Taking you online… If nothing happens, <a href="$(link-redirect)">tap here to continue</a>.</p>
  </div>
</body>
</html>
