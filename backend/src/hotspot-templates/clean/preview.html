<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wi-Fi Login — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes floatGlow { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-18px); } }
  body { position: relative; min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'Plus Jakarta Sans','Cairo',sans-serif; background: #eceef4; overflow: hidden; }
  .glow-a { position: absolute; top: -220px; left: 50%; width: 760px; height: 760px; transform: translateX(-50%); background: radial-gradient(circle at center, rgba(99,102,241,0.28), rgba(99,102,241,0) 62%); animation: floatGlow 9s ease-in-out infinite; pointer-events: none; }
  .glow-b { position: absolute; bottom: -260px; right: -120px; width: 560px; height: 560px; background: radial-gradient(circle at center, rgba(168,148,255,0.22), rgba(168,148,255,0) 64%); pointer-events: none; }
  .wrap { position: relative; width: 100%; max-width: 430px; }
  .card { background: #ffffff; border: 1px solid #e7e9f1; border-radius: 28px; padding: 36px 40px 40px; box-shadow: 0 30px 70px -30px rgba(40,42,80,0.35), 0 2px 8px rgba(40,42,80,0.04); }
  .lang-row { display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .lang-toggle { display: inline-flex; background: #f1f2f8; border: 1px solid #e7e9f1; border-radius: 999px; padding: 3px; gap: 2px; }
  .lang-btn { font-family: 'Plus Jakarta Sans',sans-serif; font-size: 12.5px; font-weight: 700; padding: 7px 16px; border: none; border-radius: 999px; cursor: pointer; transition: all .15s; background: transparent; color: #8b8fa3; }
  .lang-btn.ar { font-family: 'Cairo',sans-serif; font-size: 13px; }
  .lang-btn.active { background: #ffffff; color: #4f46e5; box-shadow: 0 1px 3px rgba(40,42,80,0.12); }
  .brand { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 18px; margin-bottom: 30px; }
  .brand-logo { position: relative; width: 88px; height: 88px; border-radius: 24px; background: #f3f5fb; border: 1px solid #e7e9f1; display: flex; align-items: center; justify-content: center; }
  .brand-logo svg { width: 52px; height: 52px; color: #4f46e5; }
  .brand-text { display: flex; flex-direction: column; gap: 6px; }
  .pill { align-self: center; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #6366f1; background: #eef0fe; padding: 5px 12px; border-radius: 999px; }
  .brand h1 { margin: 0; font-size: 25px; font-weight: 800; color: #1a1c2e; letter-spacing: -0.02em; }
  .brand p { margin: 0; font-size: 14.5px; color: #7b7f95; font-weight: 500; }
  form { display: flex; flex-direction: column; gap: 14px; }
  .field { position: relative; display: block; }
  .field .icon { position: absolute; inset-inline-start: 16px; top: 50%; transform: translateY(-50%); color: #9499ad; display: flex; pointer-events: none; }
  .input { width: 100%; height: 54px; padding-block: 0; padding-inline-start: 46px; padding-inline-end: 16px; font-family: inherit; font-size: 16px; font-weight: 600; letter-spacing: 0.06em; color: #1a1c2e; background: #f6f7fb; border: 1.5px solid #e7e9f1; border-radius: 14px; outline: none; transition: border-color .15s, box-shadow .15s, background .15s; }
  .input::placeholder { font-weight: 500; letter-spacing: 0; color: #9499ad; }
  .input:focus { border-color: #6366f1; background: #ffffff; box-shadow: 0 0 0 4px rgba(99,102,241,0.12); }
  .btn { margin-top: 6px; height: 54px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; font-size: 15.5px; font-weight: 700; color: #ffffff; background: linear-gradient(150deg,#4f46e5,#6d63f0); border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 14px 26px -12px rgba(79,70,229,0.7); transition: transform .12s, box-shadow .2s; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 18px 30px -12px rgba(79,70,229,0.8); }
  .btn-label { white-space: nowrap; }
  .footer-info { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 24px; padding-top: 22px; border-top: 1px solid #eef0f5; }
  .footer-info .chip { display: flex; align-items: center; gap: 7px; color: #8b8fa3; font-size: 12.5px; font-weight: 600; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: #d4d7e2; }
  .foot { text-align: center; margin: 22px 0 0; font-size: 12.5px; color: #9095a8; font-weight: 500; }
  .foot b { font-weight: 700; color: #6b7088; }
</style>
</head>
<body>
  <div class="glow-a"></div>
  <div class="glow-b"></div>
  <div class="wrap">
    <div class="card">
      <div class="lang-row">
        <div class="lang-toggle">
          <button type="button" class="lang-btn active">EN</button>
          <button type="button" class="lang-btn ar">عربي</button>
        </div>
      </div>
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
        </div>
        <div class="brand-text">
          <span class="pill">Wasel</span>
          <h1>Riverside Café</h1>
          <p>Complimentary Wi-Fi for our guests</p>
        </div>
      </div>
      <form onsubmit="return false">
        <label class="field">
          <span class="icon">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H4v4"></path><path d="M2 7h20v3a2 2 0 0 0 0 4v3H2v-3a2 2 0 0 0 0-4z"></path><path d="M12 5v14" stroke-dasharray="2 3"></path></svg>
          </span>
          <input class="input" type="text" value="48291023" placeholder="Enter access code">
        </label>
        <button class="btn" type="submit"><span class="btn-label">Connect to Wi-Fi</span></button>
      </form>
      <div class="footer-info">
        <div class="chip">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <span>Secured</span>
        </div>
        <span class="dot"></span>
        <div class="chip">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline></svg>
          <span>High speed</span>
        </div>
      </div>
    </div>
    <p class="foot">Connected via <b>Riverside Café</b> · Need help? Ask our staff</p>
  </div>
</body>
</html>
