<!DOCTYPE html>
<!-- Render-only mock for the picker screenshot (preview.png, 500x920).
     NEVER pushed to routers — Google Fonts CDN is allowed here only. -->
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daylight preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; width: 500px; height: 920px; overflow: hidden; background: #f6f5f1; color: #20242f; font-family: 'Cairo', system-ui, sans-serif; }
  .wrap { width: 100%; max-width: 430px; margin: 0 auto; padding: 156px 26px 0; }

  .lang-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
  .lang-toggle { display: inline-flex; background: #edece6; border: 1px solid #e4e2da; border-radius: 999px; padding: 3px; }
  .lang-btn { min-height: 42px; min-width: 52px; padding: 0 16px; font-family: inherit; font-size: 14px; font-weight: 700; border: none; border-radius: 999px; background: transparent; color: #5c6170; }
  .lang-btn.active { background: #ffffff; color: #20242f; box-shadow: 0 1px 3px rgba(32,36,47,0.14); }

  .brand { text-align: center; margin: 14px 0 28px; }
  .badge { width: 60px; height: 60px; margin: 0 auto 14px; border-radius: 50%; background: rgba(15,118,110,0.10); border: 1px solid rgba(15,118,110,0.25); display: flex; align-items: center; justify-content: center; }
  .badge svg { width: 32px; height: 32px; color: #0f766e; }
  .eyebrow { margin: 0 0 2px; font-size: 16px; font-weight: 600; color: #5c6170; }
  h1 { margin: 0; font-size: 30px; line-height: 1.35; font-weight: 800; color: #20242f; }

  .ticket { position: relative; background: #ffffff; border: 1px solid #e4e2da; border-radius: 18px; box-shadow: 0 18px 40px -24px rgba(32,36,47,0.28); }
  .t-top { padding: 24px 24px 22px; }
  .t-bot { padding: 20px 24px 24px; }
  .perf { position: relative; height: 0; border-top: 2px dashed #ddd9cf; }
  .perf i { position: absolute; top: -10px; width: 20px; height: 20px; background: #f6f5f1; border: 1px solid #e4e2da; border-radius: 50%; }
  .perf i.l { left: -11px; }
  .perf i.r { right: -11px; }

  .code-label { display: block; font-size: 15px; font-weight: 700; color: #5c6170; margin-bottom: 9px; }
  .input { display: flex; align-items: center; width: 100%; height: 58px; padding: 0 16px; font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.04em; color: #20242f; background: #ffffff; border: 1.5px solid #0f766e; border-radius: 12px; box-shadow: 0 0 0 4px rgba(15,118,110,0.14); direction: ltr; }
  .caret { display: inline-block; width: 2px; height: 24px; background: #0f766e; margin-left: 2px; }

  .btn { height: 58px; width: 100%; display: flex; align-items: center; justify-content: center; font-family: inherit; font-size: 18px; font-weight: 700; color: #ffffff; background: #0f766e; border: none; border-radius: 12px; box-shadow: 0 12px 22px -12px rgba(15,118,110,0.55); }

  .foot { display: flex; align-items: center; justify-content: center; margin: 22px 0 0; font-size: 14px; font-weight: 600; color: #5c6170; }
  .foot svg { width: 15px; height: 15px; color: #0f766e; margin-left: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lang-row">
      <div class="lang-toggle">
        <button type="button" class="lang-btn active">عربي</button>
        <button type="button" class="lang-btn">EN</button>
      </div>
    </div>

    <div class="brand">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
      </div>
      <p class="eyebrow">أهلاً بك في</p>
      <h1>شبكة واصل</h1>
    </div>

    <div class="ticket">
      <div class="t-top">
        <span class="code-label">رمز الدخول</span>
        <div class="input"><span>Xk4p7Rm2</span><span class="caret"></span></div>
      </div>
      <div class="perf"><i class="l"></i><i class="r"></i></div>
      <div class="t-bot">
        <div class="btn">الاتصال بالإنترنت</div>
      </div>
    </div>

    <p class="foot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg><span>مشغَّلة عبر منصة واصل</span></p>
  </div>
</body>
</html>
