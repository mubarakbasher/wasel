<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logged Out</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'Plus Jakarta Sans',sans-serif; background: #eceef4; }
  .card { width: 100%; max-width: 430px; background: #ffffff; border: 1px solid #e7e9f1; border-radius: 28px; padding: 40px; text-align: center; box-shadow: 0 30px 70px -30px rgba(40,42,80,0.35); }
  .icon { width: 64px; height: 64px; border-radius: 50%; background: #eef0fe; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 800; color: #1a1c2e; }
  p { margin: 0 0 24px; font-size: 14.5px; color: #7b7f95; font-weight: 500; }
  .btn { display: inline-flex; align-items: center; justify-content: center; height: 50px; padding: 0 28px; font-size: 15px; font-weight: 700; color: #ffffff; text-decoration: none; background: linear-gradient(150deg,#4f46e5,#6d63f0); border-radius: 14px; box-shadow: 0 14px 26px -12px rgba(79,70,229,0.7); }
  $(if logged-out-link)$(endif)
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </div>
    <h1>You are logged out</h1>
    <p>You have been disconnected from the Wi-Fi network. Uptime: $(uptime)</p>
    <a class="btn" href="$(link-login)">Log in again</a>
  </div>
</body>
</html>
