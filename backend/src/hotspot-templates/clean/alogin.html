<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="refresh" content="2; url=$(link-redirect)">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>تم الاتصال</title>
<style>
  @font-face { font-family: 'Cairo'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('cairo.woff2') format('woff2'); }
  @font-face { font-family: 'Plus Jakarta Sans'; font-style: normal; font-weight: 400 800; font-display: swap; src: url('plus-jakarta-sans.woff2') format('woff2'); }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; background: #f6f5f1; color: #20242f; font-family: 'Cairo', system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif; }
  html[lang="en"] body { font-family: 'Plus Jakarta Sans', 'Cairo', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .page { display: flex; min-height: 100vh; min-height: 100dvh; }
  .wrap { margin: auto; width: 100%; max-width: 400px; padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  .card { background: #ffffff; border: 1px solid #e4e2da; border-radius: 18px; padding: 34px 24px; text-align: center; box-shadow: 0 18px 40px -24px rgba(32,36,47,0.28); }
  .icon { width: 60px; height: 60px; border-radius: 50%; background: rgba(%WASEL_ACCENT_RGB%,0.10); border: 1px solid rgba(%WASEL_ACCENT_RGB%,0.25); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
  .icon svg { width: 28px; height: 28px; color: %WASEL_ACCENT%; }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 800; color: #20242f; }
  .sub { margin: 0 0 8px; font-size: 14.5px; font-weight: 600; color: #5c6170; word-wrap: break-word; overflow-wrap: break-word; }
  p.go { margin: 0; font-size: 13.5px; font-weight: 600; color: #5c6170; line-height: 1.6; }
  a { color: %WASEL_ACCENT%; font-weight: 700; text-decoration: none; }
</style>
<script language="JavaScript">
<!--
function startRedirect() {
$(if popup == 'true')
  open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=320,height=420');
$(endif)
  location.href = '$(link-redirect)';
}
//-->
</script>
</head>
<body onload="startRedirect()">
  <div class="page">
    <div class="wrap">
      <div class="card">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1 data-i18n="title">تم الاتصال بنجاح</h1>
        <p class="sub"><span data-i18n="via">أنت الآن متصل بشبكة</span> %WASEL_NAME%</p>
        <p class="go"><span data-i18n="taking">جارٍ نقلك إلى الإنترنت…</span> <a href="$(link-redirect)" data-i18n="tap">اضغط هنا إذا لم يحدث شيء</a></p>
      </div>
    </div>
  </div>

<script type="text/javascript">
var I18N = {
  ar: { title: "تم الاتصال بنجاح", via: "أنت الآن متصل بشبكة", taking: "جارٍ نقلك إلى الإنترنت…", tap: "اضغط هنا إذا لم يحدث شيء" },
  en: { title: "You're connected", via: "You're now on", taking: "Taking you online…", tap: "Tap here if nothing happens" }
};
function getLang() {
  try { var v = localStorage.getItem('waselLang'); if (v === 'en' || v === 'ar') { return v; } } catch (e) {}
  return 'ar';
}
function applyLang(lang) {
  var t = I18N[lang] || I18N.ar;
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  var nodes = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < nodes.length; i++) {
    var k = nodes[i].getAttribute('data-i18n');
    if (t[k] != null) { nodes[i].textContent = t[k]; }
  }
}
applyLang(getLang());
</script>
</body>
</html>
