<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>%WASEL_NAME%</title>
<style>
:root {
  --accent: %WASEL_ACCENT%;
  --accent-rgb: %WASEL_ACCENT_RGB%;
}
body {
  background-color: rgba(var(--accent-rgb), 0.05);
  color: #111;
}
.btn { background: var(--accent); }
</style>
</head>
<body>
<h1>%WASEL_NAME%</h1>
<form action="$(link-login-only)" method="post">
$(if error)<p class="error">$(error)</p>$(endif)
$(if chap-id)
<input type="hidden" name="$(chap-id)" value="$(chap-challenge)">
$(endif)
<input type="text" name="username" autocomplete="username">
<input type="password" name="password" autocomplete="current-password">
<p>$(session-time-left)</p>
<button type="submit">Login</button>
</form>
<div>$(uptime) | $(bytes-in-nice) / $(bytes-out-nice)</div>
<a href="$(link-orig)">Continue</a>
<a href="$(link-logout)">Logout</a>
</body>
</html>
